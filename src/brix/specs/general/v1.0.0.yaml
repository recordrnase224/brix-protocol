metadata:
  name: general
  version: '1.0.0'
  domain: general
  description: >
    General-purpose BRIX specification covering common high-risk patterns
    across medical, legal, and financial domains. Suitable as a baseline
    for most LLM deployments before domain-specific customization.
  model_compatibility:
    - model_family: gpt-4
      status: community
      notes: 'Community-tested with GPT-4 and GPT-4 Turbo'
    - model_family: gpt-3.5-turbo
      status: community
      notes: 'Community-tested, higher false-negative rate on nuanced queries'
    - model_family: claude-3
      status: community
      notes: 'Community-tested with Claude 3 Opus and Sonnet'

circuit_breakers:
  - name: medical_dosing
    description: >
      Fires on any query requesting specific drug dosages, lethal dose
      information, or dosing calculations. Medical dosing errors can cause
      direct patient harm and must always trigger retrieval verification.
    patterns:
      - 'lethal dose'
      - 'fatal dose'
      - 'maximum dose'
      - 'dosage for'
      - 'how much to take'
      - 'mg per kg'
      - 'milligrams per kilogram'
      - 'overdose amount'
      - 'drug interaction'
      - 'contraindication'
      - 'adverse reaction'
      - 'side effect of'
    exclude_context:
      - 'pharmacology textbook'
      - 'educational context'
      - 'training material'
      - 'exam question'

  - name: legal_obligations
    description: >
      Fires on queries about specific legal requirements, jurisdictional
      mandates, or regulatory obligations where incorrect information
      could lead to non-compliance or legal liability.
    patterns:
      - 'statute of limitations'
      - 'legal requirement'
      - 'legally required'
      - 'mandatory reporting'
      - 'regulatory requirement'
      - 'compliance obligation'
      - 'jurisdictional'
      - 'court order'
      - 'legally binding'
      - 'penalty for'
      - 'fine for violating'
    exclude_context:
      - 'legal history'
      - 'academic discussion'
      - 'general overview'
      - 'hypothetical scenario'

  - name: financial_advice
    description: >
      Fires on queries seeking specific financial advice including
      investment recommendations, tax calculations, and fiduciary
      guidance where incorrect information could cause direct
      financial harm.
    patterns:
      - 'should i invest'
      - 'investment advice'
      - 'tax deduction for'
      - 'tax liability'
      - 'fiduciary duty'
      - 'financial obligation'
      - 'retirement calculation'
      - 'interest rate for'
      - 'loan qualification'
      - 'credit score impact'
    exclude_context:
      - 'financial literacy'
      - 'educational material'
      - 'textbook example'
      - 'general concept'

risk_signals:
  - name: specific_numbers
    description: 'Queries requesting precise numerical values that may require verification'
    patterns:
      - 'the number is'
      - 'costs $'
      - 'priced at'
      - 'percentage of'
    weight: 0.3
    category: universal
    exclude_context:
      - 'approximate'
      - 'roughly'
      - 'about'
      - 'estimate'
      - 'around'

  - name: specific_dates
    description: 'Queries referencing specific deadlines or expiration dates'
    patterns:
      - 'deadline is'
      - 'due date'
      - 'expires on'
      - 'effective date'
    weight: 0.25
    category: universal
    exclude_context:
      - 'historical'
      - 'in the past'
      - 'general timeline'
      - 'no specific date'
      - 'just curious'

  - name: proper_names
    description: 'Queries about specific people or organizations requiring attribution accuracy'
    patterns:
      - 'founded by'
      - 'CEO of'
      - 'president of'
      - 'director of'
    weight: 0.2
    category: universal
    exclude_context:
      - 'general knowledge'
      - 'well known'
      - 'common knowledge'
      - 'famous'

  - name: uncertainty_language
    description: 'Queries where the user explicitly signals they need reliable confirmation'
    patterns:
      - 'is it true that'
      - 'can you confirm'
      - 'is it safe to'
      - 'is it legal to'
      - 'fact check'
    weight: 0.6
    category: registered
    exclude_context:
      - 'just wondering'
      - 'hypothetically'
      - 'casual question'

  - name: factual_claims
    description: 'Queries making or requesting verification of specific factual claims'
    patterns:
      - 'the fact is'
      - 'it is known that'
      - 'studies show'
      - 'research proves'
      - 'scientifically proven'
    weight: 0.7
    category: registered
    exclude_context:
      - 'opinion'
      - 'some people believe'
      - 'debated topic'
      - 'controversial'

  - name: time_sensitive
    description: 'Queries about information with explicit time-dependence or expiration'
    patterns:
      - 'current price'
      - 'latest version'
      - 'current status'
      - 'real-time'
    weight: 0.3
    category: registered
    exclude_context:
      - 'general question'
      - 'conceptual'
      - 'how does it work'

  - name: instruction_following
    description: 'Queries that attempt to override model safety constraints'
    patterns:
      - 'ignore previous'
      - 'disregard instructions'
      - 'pretend you are'
      - 'jailbreak'
      - 'do not refuse'
    weight: 0.9
    category: registered
    exclude_context:
      - 'security research'
      - 'red team'
      - 'testing prompt'

uncertainty_types:
  - name: epistemic
    description: >
      The model lacks knowledge to answer reliably. Activates retrieval
      augmentation to ground the response in verified source material.
    action_config:
      action: force_retrieval
      force_retrieval: true
      message_template: >
        I've detected that this query requires verified information that
        may not be reliably available in my training data. Let me retrieve
        authoritative sources to provide an accurate response.

  - name: contradictory
    description: >
      The model produces conflicting information across samples. Triggers
      explicit conflict resolution that identifies and addresses the
      specific contradictions.
    action_config:
      action: conflict_resolution
      message_template: >
        I've identified conflicting information regarding this topic.
        Here is an analysis of the different positions and their
        relative support:

  - name: open_ended
    description: >
      The query has no single correct answer. Produces a distribution
      of plausible outcomes with conditions and estimated likelihoods.
    action_config:
      action: distribution_response
      message_template: >
        This question has multiple valid perspectives. Here is a
        distribution of the main positions and the conditions under
        which each applies:

sampling_config:
  low_threshold: 0.40
  medium_threshold: 0.70
  low_samples: 1
  medium_samples: 2
  high_samples: 3
  circuit_breaker_samples: 3
  temperature: 0.7
